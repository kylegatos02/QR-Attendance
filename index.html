<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Attendance System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #1e3c72;
  color: white;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

#reader {
  width: 320px;
  margin: auto;
  border-radius: 10px;
  overflow: hidden;
}

#result, #status {
  margin-top: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>QR ATTENDANCE SYSTEM</h2>

<div id="reader"></div>

<div id="result">Loading...</div>
<div id="status">SYNC: READY</div>

<script>
const SYNC_URL = "https://script.google.com/macros/s/AKfycbxvKovFC2nAvABKtnZNgZYGL7fy2fibKFD0JkqOoiB0Eh2i69Mx6dW8uB9vSgfFwr3-/exec";

// -------------------- DEVICE ID
const deviceId = localStorage.getItem("deviceId") ||
  (crypto.randomUUID ? crypto.randomUUID() : "dev-" + Math.random().toString(36).substr(2, 9));

localStorage.setItem("deviceId", deviceId);

// -------------------- INDEXEDDB
let db;
let pendingSync = 0;

const request = indexedDB.open("QR_Attendance", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("attendance", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = e => {
  db = e.target.result;
  updateStatus("READY");
};

// -------------------- SAVE OFFLINE
function saveOffline(record) {
  const tx = db.transaction(["attendance"], "readwrite");
  tx.objectStore("attendance").add(record);

  pendingSync++;
  updateStatus("PENDING");
}

// -------------------- SCAN
let lastScan = "";

function onScanSuccess(text) {

  if (text === lastScan) return;
  lastScan = text;

  const record = {
    id: text,
    date: new Date().toISOString(),
    device: deviceId
  };

  saveOffline(record);

  document.getElementById("result").innerText =
    "Saved: " + text;

  setTimeout(() => lastScan = "", 1500);
}

// -------------------- SYNC
function syncData() {

  if (!navigator.onLine || !db || pendingSync === 0) return;

  const tx = db.transaction(["attendance"], "readonly");
  const store = tx.objectStore("attendance");

  const req = store.getAll();

  req.onsuccess = () => {

    const data = req.result;

    if (!data.length) return;

    fetch(SYNC_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(res => {

      if (res === "SYNC_SUCCESS") {

        db.transaction(["attendance"], "readwrite")
          .objectStore("attendance")
          .clear();

        pendingSync = 0;
        updateStatus("SYNCED");
      } else {
        updateStatus("FAILED");
      }
    })
    .catch(() => updateStatus("FAILED"));
  };
}

setInterval(syncData, 8000);

// -------------------- STATUS
function updateStatus(state) {

  const el = document.getElementById("status");

  if (state === "READY") el.innerText = "🟢 READY";
  if (state === "PENDING") el.innerText = "🟠 PENDING SYNC";
  if (state === "SYNCED") el.innerText = "🟢 SYNCED TO SHEETS";
  if (state === "FAILED") el.innerText = "🔴 SYNC FAILED";
}

// -------------------- CAMERA FIX (BACK CAMERA)
Html5Qrcode.getCameras().then(devices => {

  const backCam = devices.find(d =>
    d.label.toLowerCase().includes("back") ||
    d.label.toLowerCase().includes("rear")
  );

  const cameraId = backCam ? backCam.id : devices[0].id;

  const qr = new Html5Qrcode("reader");

  qr.start(
    cameraId,
    { fps: 8, qrbox: 220 },
    onScanSuccess
  );

});
</script>

</body>
</html>
