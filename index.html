<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Offline QR Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #1e3c72;
  color: white;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

#reader {
  width: 320px;
  margin: auto;
  border-radius: 10px;
  overflow: hidden;
}

#result {
  margin-top: 15px;
  font-size: 18px;
}

#syncStatus {
  margin-top: 10px;
  font-size: 16px;
  padding: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>OFFLINE QR ATTENDANCE</h2>

<div id="reader"></div>

<div id="result">Loading...</div>
<div id="syncStatus">SYNC: UNKNOWN</div>

<script>
const SYNC_URL = "https://script.google.com/macros/s/AKfycbye_LqtGkk5tMJViI2vveWk0JzVnE2jmVxSpw_qxsAmVwFFioM1bnNZf3-bhl4AFC384Q/exec";

// -------------------------
// DEVICE ID
// -------------------------
const deviceId = localStorage.getItem("deviceId") ||
  (crypto.randomUUID ? crypto.randomUUID() : "device-" + Math.random().toString(36).substr(2, 9));

localStorage.setItem("deviceId", deviceId);

// -------------------------
// GLOBAL VARIABLES
// -------------------------
let db;
let pendingSync = 0;
let lastSyncTime = null;

// -------------------------
// INDEXEDDB INIT
// -------------------------
const request = indexedDB.open("AttendanceDB", 1);

request.onupgradeneeded = function(e) {
  db = e.target.result;

  db.createObjectStore("attendance", {
    keyPath: "key",
    autoIncrement: true
  });
};

request.onsuccess = function(e) {
  db = e.target.result;
  updateStatus("READY");
};

// -------------------------
// SAVE OFFLINE
// -------------------------
function saveOffline(record) {

  const tx = db.transaction(["attendance"], "readwrite");
  const store = tx.objectStore("attendance");

  store.add(record);

  pendingSync++;
  updateStatus("PENDING");
}

// -------------------------
// SCAN CONTROL
// -------------------------
let lastScan = "";

function onScanSuccess(decodedText) {

  if (decodedText === lastScan) return;
  lastScan = decodedText;

  const record = {
    id: decodedText,
    status: "Present",
    date: new Date().toISOString(),
    device: deviceId
  };

  saveOffline(record);

  document.getElementById("result").innerText =
    "Saved Offline: " + decodedText;

  setTimeout(() => lastScan = "", 1500);
}

// -------------------------
// SYNC DATA
// -------------------------
function syncData() {

  if (!navigator.onLine || !db || pendingSync === 0) {
    updateStatus("OFFLINE");
    return;
  }

  const tx = db.transaction(["attendance"], "readonly");
  const store = tx.objectStore("attendance");

  const req = store.getAll();

  req.onsuccess = function() {

    const data = req.result;

    if (!data.length) return;

    fetch(SYNC_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(res => {

      if (res === "SYNC_SUCCESS") {

        const tx2 = db.transaction(["attendance"], "readwrite");
        const store2 = tx2.objectStore("attendance");
        store2.clear();

        pendingSync = 0;
        lastSyncTime = new Date();

        updateStatus("SYNCED");
      }
    })
    .catch(() => {
      updateStatus("SYNC_FAILED");
    });
  };
}

// auto sync every 10 sec
setInterval(syncData, 10000);

// -------------------------
// STATUS SYSTEM
// -------------------------
function updateStatus(type) {

  const el = document.getElementById("syncStatus");

  if (type === "SYNCED") {
    el.innerHTML = "🟢 SYNCED<br>Last: " + lastSyncTime.toLocaleTimeString();
  }

  else if (type === "PENDING") {
    el.innerHTML = "🟠 PENDING SYNC (" + pendingSync + ")";
  }

  else if (type === "OFFLINE") {
    el.innerHTML = "🔴 OFFLINE - Waiting for internet";
  }

  else if (type === "SYNC_FAILED") {
    el.innerHTML = "⚠ SYNC FAILED - retrying...";
  }

  else {
    el.innerHTML = "SYNC: READY";
  }
}

// -------------------------
// CAMERA (BACK CAMERA PRIORITY)
// -------------------------
Html5Qrcode.getCameras().then(devices => {

  if (!devices || devices.length === 0) {
    document.getElementById("result").innerText = "No camera found";
    return;
  }

  let backCamera = devices.find(device =>
    device.label.toLowerCase().includes("back") ||
    device.label.toLowerCase().includes("rear")
  );

  const cameraId = backCamera ? backCamera.id : devices[0].id;

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    cameraId,
    {
      fps: 8,
      qrbox: 220,
      disableFlip: true
    },
    onScanSuccess
  )
  .then(() => {
    document.getElementById("result").innerText = "Camera Ready";
  })
  .catch(err => {
    console.error(err);
    document.getElementById("result").innerText = "Camera Error";
  });

});
</script>

</body>
</html>
