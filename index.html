<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Offline QR Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #1e3c72;
  color: white;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

#reader {
  width: 320px;
  margin: auto;
  border-radius: 10px;
  overflow: hidden;
}

#result {
  margin-top: 20px;
  font-size: 18px;
  padding: 10px;
}
</style>
</head>

<body>

<h2>OFFLINE QR ATTENDANCE</h2>

<div id="reader"></div>
<div id="result">Initializing...</div>

<script>
const SYNC_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";

// -------------------------
// DEVICE ID
// -------------------------
const deviceId = localStorage.getItem("deviceId") ||
  (crypto.randomUUID ? crypto.randomUUID() : "device-" + Math.random().toString(36).substr(2, 9));

localStorage.setItem("deviceId", deviceId);

// -------------------------
// INDEXEDDB SETUP
// -------------------------
let db;

const request = indexedDB.open("AttendanceDB", 1);

request.onupgradeneeded = function(e) {
  db = e.target.result;

  const store = db.createObjectStore("attendance", {
    keyPath: "key",
    autoIncrement: true
  });
};

request.onsuccess = function(e) {
  db = e.target.result;
  document.getElementById("result").innerText = "Scanner Ready";
};

// -------------------------
// SAVE OFFLINE
// -------------------------
function saveOffline(record) {
  const tx = db.transaction(["attendance"], "readwrite");
  const store = tx.objectStore("attendance");
  store.add(record);
}

// -------------------------
// SCAN LOGIC
// -------------------------
let lastScan = "";

function onScanSuccess(decodedText) {

  if (decodedText === lastScan) return;
  lastScan = decodedText;

  const record = {
    id: decodedText,
    status: "Present",
    date: new Date().toISOString(),
    device: deviceId
  };

  saveOffline(record);

  document.getElementById("result").innerText =
    "Saved Offline: " + decodedText;

  // reset scan lock
  setTimeout(() => lastScan = "", 1500);
}

// -------------------------
// SYNC FUNCTION
// -------------------------
function syncData() {

  if (!navigator.onLine || !db) return;

  const tx = db.transaction(["attendance"], "readonly");
  const store = tx.objectStore("attendance");

  const request = store.getAll();

  request.onsuccess = function() {

    const data = request.result;

    if (!data.length) return;

    fetch(SYNC_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(res => {

      if (res === "SYNC_SUCCESS") {

        const tx2 = db.transaction(["attendance"], "readwrite");
        const store2 = tx2.objectStore("attendance");
        store2.clear();

        console.log("SYNCED SUCCESS");
      }
    });
  };
}

// auto sync every 10 sec
setInterval(syncData, 10000);

// -------------------------
// CAMERA START (FIXED)
// -------------------------
Html5Qrcode.getCameras().then(devices => {

  if (devices && devices.length) {

    const cameraId = devices[0].id;

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      cameraId,
      {
        fps: 8,
        qrbox: 220,
        disableFlip: true
      },
      onScanSuccess
    );

  } else {
    document.getElementById("result").innerText = "No camera found";
  }

}).catch(err => {
  console.error(err);
  document.getElementById("result").innerText = "Camera error";
});
</script>

</body>
</html>
