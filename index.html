<!DOCTYPE html>
<html>
<head>
  <title>QR Attendance Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }
    h2 {
      margin-top: 20px;
    }
    #reader {
      width: 300px;
      margin: 20px auto;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h2>Scan QR Code</h2>
<div id="reader"></div>
<div id="status">Camera starting...</div>

<script>
const webAppUrl = "https://script.google.com/macros/s/AKfycbxq2RP9XJ6FEde3M4vUUVtmxJvsrgJcCDUOalCcwqAMviFdQe_W2GosCqYN6RMifQ2dow/exec";

function onScanSuccess(decodedText) {
  document.getElementById("status").innerHTML = "Processing...";

  // Stop camera after scan
  html5QrCode.stop().then(() => {
      // Redirect to Apps Script with scanned ID
      window.location.href = webAppUrl + "?id=" + decodedText;
  });
}

function onScanFailure(error) {
  // Ignore scan errors
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      onScanSuccess,
      onScanFailure
    );
  } else {
    document.getElementById("status").innerHTML = "No camera found.";
  }
}).catch(err => {
  document.getElementById("status").innerHTML = "Camera error: " + err;
});
</script>

</body>
</html>
