<!DOCTYPE html>
<html>
<head>
  <title>Event QR Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    h2 {
      margin-top: 15px;
    }

    #reader {
      width: 300px;
      margin: 20px auto;
    }

    #resultBox {
      margin-top: 15px;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      display: none;
    }

    .approved {
      background: #28a745;
      color: white;
    }

    .error {
      background: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

<h2>Scan QR Code</h2>

<div id="reader"></div>
<div id="resultBox"></div>

<script>

const webAppUrl = "https://script.google.com/macros/s/AKfycbyUgrL7pidfDBtHlagXU9k7Bhm1uTINKFG6U643H0ZmLJ0H_GPZdpd1E6F1A7o0RSGm7g/exec"; 

let isProcessing = false;

function showResult(message, type) {
  const box = document.getElementById("resultBox");
  box.className = "";
  box.classList.add(type);
  box.innerHTML = message;
  box.style.display = "block";

  setTimeout(() => {
    box.style.display = "none";
  }, 2000);
}

function onScanSuccess(decodedText) {

  if (isProcessing) return;
  isProcessing = true;

  fetch(webAppUrl + "?id=" + decodedText)
    .then(response => response.text())
    .then(result => {

      if (result.includes("APPROVED")) {
        showResult("✅ APPROVED", "approved");
      } 
      else if (result.includes("ALREADY_SCANNED")) {
        showResult("⚠ Already Scanned", "error");
      } 
      else {
        showResult("❌ ID NOT FOUND", "error");
      }

      setTimeout(() => {
        isProcessing = false;
      }, 1500);

    })
    .catch(error => {
      showResult("Server Error", "error");
      isProcessing = false;
    });
}

function onScanFailure(error) {}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 20, qrbox: 250 },
      onScanSuccess,
      onScanFailure
    );
  }
});

</script>

</body>
</html>
