<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    #nameInput {
      padding: 10px;
      width: 200px;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    #reader {
      width: 500px; /* bigger QR reader */
      height: 500px;
      margin: 0 auto 20px auto;
    }
    #resultBox {
      display: none;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      border-radius: 5px;
      width: 300px;
      margin: 0 auto;
    }
    .approved {
      background-color: #d4edda;
      color: #155724;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>

  <h1>QR Code Scanner</h1>

  <!-- Name input -->
  <input type="text" id="nameInput" placeholder="Enter your name">

  <!-- QR Code Reader -->
  <div id="reader"></div>

  <!-- Result Box -->
  <div id="resultBox"></div>

  <!-- Include QR Code library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyUgrL7pidfDBtHlagXU9k7Bhm1uTINKFG6U643H0ZmLJ0H_GPZdpd1E6F1A7o0RSGm7g/exec"; 
    let isProcessing = false;

    function showResult(message, type) {
      const box = document.getElementById("resultBox");
      box.className = "";
      box.classList.add(type);
      box.innerHTML = message;
      box.style.display = "block";

      setTimeout(() => {
        box.style.display = "none";
      }, 2000);
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      const name = document.getElementById("nameInput").value || "Unknown";
      showResult(`Checking for ${name}...`, "approved");

      fetch(webAppUrl + "?id=" + decodedText + "&name=" + encodeURIComponent(name))
        .then(response => response.text())
        .then(result => {
          console.log("Server Response:", result);

          if (result.includes("APPROVED")) {
            showResult(`✅ ${name} APPROVED`, "approved");
          } else if (result.includes("ALREADY_SCANNED")) {
            showResult(`⚠ ${name} ALREADY SCANNED`, "error");
          } else if (result.includes("NOT_FOUND")) {
            showResult(`❌ ${name} ID NOT FOUND`, "error");
          } else if (result.includes("ERROR")) {
            showResult(`⚠ SYSTEM ERROR`, "error");
          } else {
            showResult(`⚠ UNKNOWN RESPONSE`, "error");
          }

          setTimeout(() => {
            isProcessing = false;
          }, 1500);
        })
        .catch(error => {
          console.error("Fetch error:", error);
          showResult("⚠ CONNECTION ERROR", "error");
          isProcessing = false;
        });
    }

    function onScanFailure(error) {
      // ignore scan failures
    }

    window.addEventListener('DOMContentLoaded', () => {
      const html5QrCode = new Html5Qrcode("reader");
      Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length) {
          html5QrCode.start(
            { facingMode: "environment" },
            { fps: 20, qrbox: 400 }, // QR box bigger
            onScanSuccess,
            onScanFailure
          );
        } else {
          showResult("⚠ No camera found", "error");
        }
      }).catch(err => {
        console.error("Camera error:", err);
        showResult("⚠ Camera error", "error");
      });
    });
  </script>

</body>
</html>
