<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 20px;
    }

    #reader {
      width: 100%;
      max-width: 400px;  /* max width for desktop */
      margin: 0 auto 20px auto;
    }

    #resultBox {
      display: none;
      text-align: center;
      padding: 15px;
      font-weight: bold;
      border-radius: 5px;
      width: 90%;
      max-width: 300px;
      margin: 0 auto;
      white-space: pre-line; /* allows line breaks */
      font-size: 18px;
    }

    .approved {
      background-color: #d4edda;
      color: #155724;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>

  <h1>QR Code Scanner</h1>

  <!-- QR Code Reader -->
  <div id="reader"></div>

  <!-- Result Box -->
  <div id="resultBox"></div>

  <!-- Include QR Code library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyUgrL7pidfDBtHlagXU9k7Bhm1uTINKFG6U643H0ZmLJ0H_GPZdpd1E6F1A7o0RSGm7g/exec"; 
    let isProcessing = false;

    function showResult(message, type) {
      const box = document.getElementById("resultBox");
      box.className = "";
      box.classList.add(type);
      box.innerHTML = message;
      box.style.display = "block";

      setTimeout(() => {
        box.style.display = "none";
      }, 2500);
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      showResult("Checking...", "approved");

      fetch(webAppUrl + "?id=" + encodeURIComponent(decodedText))
        .then(response => response.json())
        .then(data => {
          console.log("Server Response:", data);

          if (data.status === "APPROVED") {
            showResult(`✅ APPROVED\n${data.name}`, "approved");
          } else if (data.status === "ALREADY_SCANNED") {
            showResult(`⚠ ALREADY SCANNED\n${data.name}`, "error");
          } else if (data.status === "NOT_FOUND") {
            showResult(`❌ ID NOT FOUND`, "error");
          } else if (data.status === "ERROR") {
            showResult(`⚠ SYSTEM ERROR`, "error");
          } else {
            showResult(`⚠ UNKNOWN RESPONSE`, "error");
          }

          setTimeout(() => { isProcessing = false; }, 1500);
        })
        .catch(error => {
          console.error("Fetch error:", error);
          showResult("⚠ CONNECTION ERROR", "error");
          isProcessing = false;
        });
    }

    function onScanFailure(error) {
      // do nothing for failed scans
    }

    window.addEventListener('DOMContentLoaded', () => {
      const html5QrCode = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length) {
          const width = Math.min(window.innerWidth * 0.9, 400);
          html5QrCode.start(
            { facingMode: "environment" },
            { fps: 20, qrbox: width }, // responsive QR box
            onScanSuccess,
            onScanFailure
          );
        } else {
          showResult("⚠ No camera found", "error");
        }
      }).catch(err => {
        console.error("Camera error:", err);
        showResult("⚠ Camera error", "error");
      });
    });
  </script>

</body>
</html>
