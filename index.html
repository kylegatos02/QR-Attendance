<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event QR Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
}

h1 {
  margin-bottom: 15px;
  font-size: 28px;
  letter-spacing: 1px;
}

#scanner-container {
  position: relative;
  width: 95vw;
  max-width: 500px;
  aspect-ratio: 1 / 1;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

#reader {
  width: 100%;
  height: 100%;
}

#overlay {
  position: absolute;
  inset: 0;
  border: 4px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  pointer-events: none;
}

#resultBox {
  position: fixed;
  bottom: 40px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  padding: 25px;
  border-radius: 20px;
  font-size: 36px;
  font-weight: bold;
  display: none;
  animation: pop 0.3s ease;
}

.approved {
  background: #00c853;
  color: white;
  box-shadow: 0 0 25px rgba(0, 255, 100, 0.8);
}

.error {
  background: #d50000;
  color: white;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.8);
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@media(max-width: 500px){
  #resultBox {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<h1>EVENT QR ATTENDANCE</h1>

<div id="scanner-container">
  <div id="reader"></div>
  <div id="overlay"></div>
</div>

<div id="resultBox"></div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const webAppUrl = "https://script.google.com/macros/s/AKfycbz22v0g3XAipmLwYFViCtzIefhOVYwvDHfMguCQHsC4hA0f2nMU34lUiPZoRa5vf7Axog/exec";
let isProcessing = false;

function showResult(message, type) {
  const box = document.getElementById("resultBox");
  box.className = "";
  box.classList.add(type);

  const lines = message.split("\n");

  box.innerHTML = `
    <div style="font-size:36px;font-weight:bold;">${lines[0]}</div>
    ${lines[1] ? `<div style="font-size:28px;margin-top:10px;">${lines[1]}</div>` : ""}
  `;

  box.style.display = "block";

  setTimeout(() => {
    box.style.display = "none";
  }, 3000);
}

function onScanSuccess(decodedText) {
  if (isProcessing) return;
  isProcessing = true;

  fetch(webAppUrl + "?id=" + decodedText)
    .then(response => response.text())
    .then(result => {

      const lines = result.split("\n");
      const status = lines[0];
      const fullName = lines[1] || "";
    
      if (status === "APPROVED") {
        showResult("✅ APPROVED\n" + fullName, "approved");
      }
      else if (status === "ALREADY_SCANNED") {
        showResult("⚠ ALREADY SCANNED\n" + fullName, "error");
      }
      else if (status === "NOT_FOUND") {
        showResult("❌ ID NOT FOUND", "error");
      }
      else {
        showResult("⚠ SYSTEM ERROR", "error");
      }
    
      setTimeout(() => {
        isProcessing = false;
      }, 1500);
    })
    .catch(error => {
      showResult("⚠ CONNECTION ERROR", "error");
      isProcessing = false;
    });
}

function onScanFailure(error) {}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 20, qrbox: 280 },
      onScanSuccess,
      onScanFailure
    );
  }
});
</script>

</body>
</html>
