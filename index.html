<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Attendance System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #1e3c72;
  color: white;
  margin: 0;
  padding: 20px;
}

h2 {
  margin-bottom: 10px;
}

#reader {
  width: 320px;
  margin: auto;
  border-radius: 10px;
  overflow: hidden;
}

#result, #status {
  margin-top: 10px;
  font-size: 16px;
}

#status {
  padding: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>QR ATTENDANCE SYSTEM</h2>

<div id="reader"></div>

<div id="result">Loading scanner...</div>
<div id="status">SYNC: READY</div>

<script>
const SYNC_URL = "https://script.google.com/macros/s/AKfycbyxKDuxu0OhVLCBvPp2FiEm-A-fZBARCRYQkMSmVyOwf7kF-p2yhYDRW9PDIu-WPiMtiw/exec"; // 🔴 PUT YOUR URL HERE

// ---------------- DEVICE ID
const deviceId = localStorage.getItem("deviceId") ||
  (crypto.randomUUID ? crypto.randomUUID() : "dev-" + Math.random().toString(36).substr(2, 9));

localStorage.setItem("deviceId", deviceId);

// ---------------- INDEXEDDB
let db;
let pending = 0;

const request = indexedDB.open("QR_Attendance", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("attendance", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = e => {
  db = e.target.result;
  setStatus("READY");
};

// ---------------- SAVE OFFLINE
function saveOffline(record) {

  const tx = db.transaction(["attendance"], "readwrite");
  tx.objectStore("attendance").add(record);

  pending++;
  setStatus("PENDING");
}

// ---------------- SCAN
let lastScan = "";

function onScanSuccess(text) {

  if (text === lastScan) return;
  lastScan = text;

  const record = {
    id: text,
    date: new Date().toISOString(),
    device: deviceId
  };

  saveOffline(record);

  document.getElementById("result").innerText =
    "Saved: " + text;

  setTimeout(() => lastScan = "", 1500);
}

// ---------------- SYNC
function syncData() {

  if (!navigator.onLine || !db || pending === 0) return;

  const tx = db.transaction(["attendance"], "readonly");
  const store = tx.objectStore("attendance");

  const req = store.getAll();

  req.onsuccess = () => {

    const data = req.result;

    if (!data.length) return;

    fetch(SYNC_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(res => {

      console.log("SYNC RESPONSE:", res);

      if (res === "SYNC_SUCCESS") {

        db.transaction(["attendance"], "readwrite")
          .objectStore("attendance")
          .clear();

        pending = 0;
        setStatus("SYNCED");

      } else {
        setStatus("FAILED");
      }
    })
    .catch(() => setStatus("FAILED"));
  };
}

setInterval(syncData, 8000);

// ---------------- STATUS
function setStatus(type) {

  const el = document.getElementById("status");

  if (type === "READY") el.innerText = "🟢 READY";
  if (type === "PENDING") el.innerText = "🟠 PENDING SYNC";
  if (type === "SYNCED") el.innerText = "🟢 SYNCED TO SHEETS";
  if (type === "FAILED") el.innerText = "🔴 SYNC FAILED";
}

// ---------------- CAMERA FIX (BACK CAMERA)
Html5Qrcode.getCameras().then(devices => {

  let backCam = devices.find(d =>
    d.label.toLowerCase().includes("back") ||
    d.label.toLowerCase().includes("rear")
  );

  const cameraId = backCam ? backCam.id : devices[0].id;

  const qr = new Html5Qrcode("reader");

  qr.start(
    cameraId,
    { fps: 8, qrbox: 220 },
    onScanSuccess
  );

});
</script>

</body>
</html>
