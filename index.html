<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event QR Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  padding: 10px;
}

h1 {
  margin-bottom: 15px;
  font-size: 28px;
  text-align: center;
  color: white;
}

#scanner-container {
  position: relative;
  width: 95vw;
  max-width: 500px;
  aspect-ratio: 1 / 1;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

#reader {
  width: 100%;
  height: 100%;
}

#overlay {
  position: absolute;
  inset: 0;
  border: 4px solid rgba(255,255,255,0.6);
  border-radius: 20px;
  pointer-events: none;
}



#resultBox {
  position: fixed;
  bottom: 40px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  padding: 25px;
  border-radius: 20px;
  font-size: 32px;
  font-weight: bold;
  display: none;
  animation: pop 0.3s ease;
}

.approved {
  background: #00c853;
  color: white;
  box-shadow: 0 0 25px rgba(0, 255, 100, 0.8);
}

.error {
  background: #d50000;
  color: white;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.8);
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<h1>ATTENDANCE</h1>

<div id="scanner-container">
  <div id="reader"></div>
  <div id="overlay"></div>
</div>

<div id="resultBox"></div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const webAppUrl = "https://script.google.com/macros/s/AKfycbz7eKqZ7z-tQQF7dKsFUX-VO684GcHlkPotTB1a7IUWmguSREcXB28h-cpq7oaDS2h_gg/exec";

let isProcessing = false;
let lastScanned = "";

// SOUND FEEDBACK (optional but fast UX)
const beep = new Audio("https://www.soundjay.com/buttons/sounds/beep-01a.mp3");

function showResult(message, type) {
  const box = document.getElementById("resultBox");
  box.className = "";
  box.classList.add(type);

  const lines = message.split("\n");

  box.innerHTML = `
    <div style="font-size:34px;">${lines[0]}</div>
    ${lines[1] ? `<div style="font-size:24px;margin-top:10px;">${lines[1]}</div>` : ""}
  `;

  box.style.display = "block";

  setTimeout(() => {
    box.style.display = "none";
  }, 2500);
}

function onScanSuccess(decodedText) {

  if (isProcessing || decodedText === lastScanned) return;

  isProcessing = true;
  lastScanned = decodedText;

  beep.play(); // instant feedback

  fetch(webAppUrl + "?id=" + decodedText, { cache: "no-store" })
    .then(response => response.text())
    .then(result => {

      const lines = result.split("\n");
      const status = lines[0];
      const fullName = lines[1] || "";

      if (status === "APPROVED") {
        showResult("✅ APPROVED\n" + fullName, "approved");
      }
      else if (status === "ALREADY_SCANNED") {
        showResult("⚠ ALREADY SCANNED\n" + fullName, "error");
      }
      else if (status === "NOT_FOUND") {
        showResult("❌ ID NOT FOUND", "error");
      }
      else {
        showResult("⚠ SYSTEM ERROR", "error");
      }

      setTimeout(() => {
        isProcessing = false;
        lastScanned = "";
      }, 1000);

    })
    .catch(() => {
      showResult("⚠ CONNECTION ERROR", "error");
      isProcessing = false;
      lastScanned = "";
    });
}

function onScanFailure(error) {}

// START CAMERA DIRECTLY (FASTER)
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: { exact: "environment" } },
  {
    fps: 10,
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0,
    disableFlip: true
  },
  onScanSuccess,
  onScanFailure
);
</script>

</body>
</html>
