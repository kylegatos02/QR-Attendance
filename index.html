<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event QR Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Global styles */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4f7, #cfe0e8);
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: bold;
      color: #1a2d3b;
      margin-bottom: 20px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    /* Scanner container */
    #scanner-container {
      position: relative;
      width: 90vw;
      max-width: 500px;
      height: 280px; /* rectangle */
      border-radius: 20px;
      overflow: hidden;
      background-color: #000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    #reader {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Scanning overlay */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 20px;
      box-sizing: border-box;
      border: 4px dashed rgba(255, 255, 255, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #overlay::before {
      content: "Align QR code here";
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      background-color: rgba(0,0,0,0.3);
      padding: 5px 10px;
      border-radius: 8px;
      position: absolute;
      top: 10px;
    }

    /* Result box */
    #resultBox {
      display: none;
      width: 90%;
      max-width: 450px;
      padding: 20px;
      border-radius: 15px;
      font-weight: bold;
      line-height: 1.4;
      word-wrap: break-word;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      font-size: 24px;
      text-align: center;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* Approved and error colors */
    .approved {
      background-color: #28a745;
      color: #fff;
    }

    .error {
      background-color: #dc3545;
      color: #fff;
    }

    /* Status and name */
    .status {
      font-size: 28px;
      font-weight: bold;
    }

    .student-name {
      font-size: 32px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    @media (max-width: 400px) {
      h1 { font-size: 22px; }
      #resultBox { font-size: 20px; padding: 15px; }
      .status { font-size: 24px; }
      .student-name { font-size: 26px; }
    }
  </style>
</head>
<body>

  <h1>Event QR Scanner</h1>

  <div id="scanner-container">
    <div id="reader"></div>
    <div id="overlay"></div>
  </div>

  <div id="resultBox"></div>

  <!-- QR Code library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyUgrL7pidfDBtHlagXU9k7Bhm1uTINKFG6U643H0ZmLJ0H_GPZdpd1E6F1A7o0RSGm7g/exec";
    let isProcessing = false;

    function showResult(message, type) {
      const box = document.getElementById("resultBox");
      box.className = "";
      box.classList.add(type);

      // Split by "|" to show name
      const parts = message.split("|");
      const status = parts[0];
      const name = parts[1] || "";

      box.innerHTML = `<div class="status">${status}</div>` + (name ? `<div class="student-name">${name}</div>` : "");

      box.style.opacity = 1;
      box.style.transform = "scale(1)";
      box.style.display = "block";

      setTimeout(() => {
        box.style.opacity = 0;
        box.style.transform = "scale(0.9)";
        setTimeout(() => { box.style.display = "none"; }, 300);
      }, 3000);
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      showResult("Checking...", "approved");

      fetch(webAppUrl + "?id=" + decodedText)
        .then(response => response.text())
        .then(result => {
          console.log("Server Response:", result);

          if (result.includes("APPROVED")) showResult(result, "approved");
          else if (result.includes("ALREADY_SCANNED")) showResult(result, "error");
          else if (result.includes("NOT_FOUND")) showResult(result, "error");
          else showResult("UNKNOWN RESPONSE|", "error");

          setTimeout(() => { isProcessing = false; }, 1500);
        })
        .catch(error => {
          console.error("Fetch error:", error);
          showResult("CONNECTION ERROR|", "error");
          isProcessing = false;
        });
    }

    function onScanFailure(error) {}

    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {
      if (devices && devices.length) {
        html5QrCode.start(
          { facingMode: "environment" },
          { fps: 20, qrbox: { width: 400, height: 200 } }, // bigger rectangle
          onScanSuccess,
          onScanFailure
        );
      }
    });
  </script>

</body>
</html>
