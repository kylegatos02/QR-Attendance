<script>

const webAppUrl = "YOUR_WEB_APP_URL";
let isProcessing = false;

function showResult(message, type) {
  const box = document.getElementById("resultBox");
  box.className = "";
  box.classList.add(type);
  box.innerHTML = message;
  box.style.display = "block";

  setTimeout(() => {
    box.style.display = "none";
  }, 2000);
}

function onScanSuccess(decodedText) {

  if (isProcessing) return;
  isProcessing = true;

  if (!decodedText.includes("|")) {
    showResult("⚠ INVALID QR FORMAT", "error");
    isProcessing = false;
    return;
  }

  showResult("Checking...", "approved");

  let parts = decodedText.split("|");
  let scannedId = parts[0];
  let scannedName = parts[1] || "";

  fetch(webAppUrl + "?id=" + encodeURIComponent(scannedId))
    .then(response => response.text())
    .then(result => {

      result = result.trim();
      console.log("Server Response:", result);

      if (result === "APPROVED") {
        showResult("✅ APPROVED<br>" + scannedName, "approved");
      }
      else if (result === "ALREADY_SCANNED") {
        showResult("⚠ ALREADY SCANNED<br>" + scannedName, "error");
      }
      else if (result === "NOT_FOUND") {
        showResult("❌ ID NOT FOUND", "error");
      }
      else if (result === "ERROR") {
        showResult("⚠ SYSTEM ERROR", "error");
      }
      else {
        showResult("⚠ UNKNOWN RESPONSE", "error");
      }

      setTimeout(() => {
        isProcessing = false;
      }, 1500);

    })
    .catch(error => {
      console.error("Fetch error:", error);
      showResult("⚠ CONNECTION ERROR", "error");
      isProcessing = false;
    });
}

function onScanFailure(error) {}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 20, qrbox: 250 },
      onScanSuccess,
      onScanFailure
    );
  }
});

</script>
